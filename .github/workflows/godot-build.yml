name: Build APK

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with: {java-version: '17', distribution: 'temurin'}
    - uses: android-actions/setup-android@v3
    
    - name: Build APK
      run: |
        mkdir -p app/src/main/java/com/rpg/naruto app/src/main/res/values app/src/main/assets
        
        printf '<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Naruto RPG</title><style>*{margin:0;padding:0}body{background:#0a0a1a;color:white;font-family:Arial;text-align:center;padding:20px}h1{color:#ff6b35}button{background:#ff6b35;color:white;border:none;padding:15px 30px;font-size:1.2em;border-radius:30px;margin:8px}.bar{width:200px;height:20px;background:#333;border-radius:10px;margin:10px auto}.fill{height:100%%;background:#4CAF50;width:100%%}</style></head><body><h1>NARUTO RPG</h1><p>HP: <b id="hp">500</b></p><div class="bar"><div class="fill" id="bar"></div></div><button onclick="atk(50)">ATTACK</button><button onclick="atk(100)">SKILL</button><button onclick="atk(200)">ULTIMATE</button><button onclick="hp=500;update()">RESET</button><script>var hp=500;function atk(d){hp-=d;if(hp<0)hp=0;update()}function update(){document.getElementById("hp").textContent=hp;document.getElementById("bar").style.width=(hp/500*100)+"%%"}</script></body></html>' > app/src/main/assets/index.html
        
        printf '<?xml version="1.0" encoding="utf-8"?>\n<manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.rpg.naruto">\n<application android:label="Naruto RPG" android:theme="@android:style/Theme.Black.NoTitleBar.Fullscreen">\n<activity android:name=".MainActivity" android:exported="true" android:screenOrientation="landscape">\n<intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>\n</activity></application></manifest>\n' > app/src/main/AndroidManifest.xml
        
        printf 'package com.rpg.naruto;\nimport android.app.Activity;\nimport android.os.Bundle;\nimport android.webkit.WebView;\nimport android.webkit.WebSettings;\nimport android.view.Window;\nimport android.view.WindowManager;\npublic class MainActivity extends Activity {\nprotected void onCreate(Bundle s) {\nsuper.onCreate(s);\nrequestWindowFeature(Window.FEATURE_NO_TITLE);\ngetWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN, WindowManager.LayoutParams.FLAG_FULLSCREEN);\nWebView wv = new WebView(this);\nWebSettings ws = wv.getSettings();\nws.setJavaScriptEnabled(true);\nws.setAllowFileAccess(true);\nwv.loadUrl("file:///android_asset/index.html");\nsetContentView(wv);\n}}\n' > app/src/main/java/com/rpg/naruto/MainActivity.java
        
        printf '<?xml version="1.0" encoding="utf-8"?>\n<resources><string name="app_name">Naruto RPG</string></resources>\n' > app/src/main/res/values/strings.xml
        
        printf 'rootProject.name="NarutoRPG"\ninclude ":app"\n' > settings.gradle
        printf 'buildscript{repositories{google();mavenCentral()}dependencies{classpath"com.android.tools.build:gradle:7.4.2"}}\nallprojects{repositories{google();mavenCentral()}}\n' > build.gradle
        printf 'apply plugin:"com.android.application"\nandroid{namespace"com.rpg.naruto"compileSdkVersion 33 defaultConfig{applicationId"com.rpg.naruto"minSdkVersion 21 targetSdkVersion 33 versionCode 1 versionName"1.0"}buildTypes{debug{debuggable true}}}\n' > app/build.gradle
        printf 'android.useAndroidX=true\norg.gradle.jvmargs=-Xmx2048m\n' > gradle.properties
        
        wget -q https://services.gradle.org/distributions/gradle-7.6-bin.zip
        unzip -q gradle-7.6-bin.zip
        export PATH=$PWD/gradle-7.6/bin:$PATH
        gradle wrapper --gradle-version 7.6
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon 2>&1 | tail -10
        find . -name "*.apk" -type f -ls
    
    - uses: actions/upload-artifact@v4
      with: {name: NarutoRPG-APK, path: "**/*.apk", if-no-files-found: warn}
