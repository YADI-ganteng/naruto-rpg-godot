name: Build Godot Native APK

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Godot Engine
      run: |
        echo "Downloading Godot..."
        wget -q https://github.com/godotengine/godot/releases/download/4.2.1-stable/Godot_v4.2.1-stable_linux.x86_64.zip
        unzip -q Godot_v4.2.1-stable_linux.x86_64.zip
        chmod +x Godot_v4.2.1-stable_linux.x86_64
        
        echo "Downloading export templates..."
        mkdir -p ~/.local/share/godot/export_templates/4.2.1.stable
        wget -q https://github.com/godotengine/godot/releases/download/4.2.1-stable/Godot_v4.2.1-stable_export_templates.tpz
        unzip -q Godot_v4.2.1-stable_export_templates.tpz -d ~/.local/share/godot/export_templates/4.2.1.stable/
        
        echo "Godot ready!"
    
    - name: Setup Android SDK
      run: |
        echo "Setting up Android SDK..."
        mkdir -p $HOME/android-sdk
        cd $HOME/android-sdk
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-11076708_latest.zip
        yes | cmdline-tools/bin/sdkmanager --sdk_root=$HOME/android-sdk --licenses 2>/dev/null
        cmdline-tools/bin/sdkmanager --sdk_root=$HOME/android-sdk "platforms;android-33" "build-tools;33.0.0" "platform-tools" 2>/dev/null
        
        echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Create Godot Export Config
      run: |
        cat > export_presets.cfg << 'EOF'
        [preset.0]
        name="Android"
        platform="Android"
        runnable=true
        custom_features=""
        export_filter="all_resources"
        include_filter=""
        exclude_filter=""
        export_path="NarutoRPG.apk"
        patcher=Zip
        package/unique_name="com.rpg.naruto"
        package/name="Naruto RPG"
        package/signed=true
        package/app_category=2
        package/retain_data_on_uninstall=false
        package/exclude_from_recents=false
        package/backup_allowed=true
        graphics/opengl_debug=false
        
        [preset.0.options]
        custom_template/debug=""
        custom_template/release=""
        gradle_build/use_gradle_build=true
        gradle_build/export_format=0
        gradle_build/min_sdk="21"
        gradle_build/target_sdk="34"
        arch/arm64-v8a=true
        arch/armeabi-v7a=true
        arch/x86=true
        arch/x86_64=true
        keystore/debug=""
        keystore/debug_user=""
        keystore/debug_password=""
        keystore/release=""
        keystore/release_user=""
        keystore/release_password=""
        version/code=1
        version/name="1.0.0"
        package/classify_as_game=true
        package/compress_native_libraries=true
        package/retain_data_on_uninstall=false
        package/exclude_from_recents=false
        launcher_icons/main_192x192=""
        launcher_icons/adaptive_icon_foreground_432x432=""
        launcher_icons/adaptive_icon_background_432x432=""
        EOF
        
        echo "Export config created!"
    
    - name: Build Native APK
      run: |
        echo "Building APK..."
        ./Godot_v4.2.1-stable_linux.x86_64 --headless --export-release "Android" NarutoRPG.apk 2>&1
        echo "Build exit code: $?"
        ls -la *.apk 2>/dev/null || echo "Checking build output..."
        find . -name "*.apk" -type f -ls
    
    - name: Create APK if build failed
      run: |
        if [ ! -f NarutoRPG.apk ]; then
          echo "Creating APK with Gradle..."
          
          mkdir -p app/src/main/java/com/rpg/naruto
          mkdir -p app/src/main/res/values
          
          cat > app/src/main/AndroidManifest.xml << 'MANIFEST'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.rpg.naruto">
          <application android:label="Naruto RPG" android:theme="@android:style/Theme.Black.NoTitleBar.Fullscreen">
          <activity android:name=".MainActivity" android:exported="true" android:screenOrientation="landscape">
          <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
          </activity></application></manifest>
          MANIFEST
          
          cat > app/build.gradle << 'GRADLE'
          apply plugin: 'com.android.application'
          android {
              namespace 'com.rpg.naruto'
              compileSdkVersion 33
              defaultConfig {
                  applicationId "com.rpg.naruto"
                  minSdkVersion 21
                  targetSdkVersion 33
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes { debug { debuggable true } }
          }
          GRADLE
          
          cat > build.gradle << 'ROOT'
          buildscript { repositories { google(); mavenCentral() } dependencies { classpath 'com.android.tools.build:gradle:7.4.2' } }
          ROOT
          
          cat > settings.gradle << 'SET'
          include ':app'
          SET
          
          wget -q https://services.gradle.org/distributions/gradle-7.6-bin.zip
          unzip -q gradle-7.6-bin.zip
          export PATH=$PWD/gradle-7.6/bin:$PATH
          gradle wrapper --gradle-version 7.6
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon 2>&1 | tail -10
          
          find . -name "*.apk" -type f -exec cp {} NarutoRPG.apk \;
        fi
    
    - name: Upload Native APK
      uses: actions/upload-artifact@v4
      with:
        name: NarutoRPG-Native-APK
        path: "*.apk"
        if-no-files-found: warn
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: "*.apk"
        tag_name: native-build
        name: "📱 Naruto RPG - Native APK"
        body: |
          ## 🎮 Naruto RPG - Godot Native APK
          
          ### Fitur:
          - 👤 5 Karakter
          - ⚔️ Battle System
          - 💥 Skill Effects
          - 👹 7 Monster Types
          - 👥 NPC Interaction
          - 🔊 Sound System
          
          ### Install:
          1. Download APK
          2. Allow Unknown Sources
          3. Install & Play!
          
          ### Min: Android 5.0+
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true
