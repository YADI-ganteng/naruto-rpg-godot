name: Build Godot APK

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Godot
      run: |
        wget -q https://github.com/godotengine/godot/releases/download/4.2.1-stable/Godot_v4.2.1-stable_linux.x86_64.zip
        unzip -q Godot_v4.2.1-stable_linux.x86_64.zip
        chmod +x Godot_v4.2.1-stable_linux.x86_64
        mkdir -p ~/.local/share/godot/export_templates/4.2.1.stable
        wget -q https://github.com/godotengine/godot/releases/download/4.2.1-stable/Godot_v4.2.1-stable_export_templates.tpz
        unzip -q Godot_v4.2.1-stable_export_templates.tpz -d ~/.local/share/godot/export_templates/4.2.1.stable/
    
    - name: Create Export Presets
      run: |
        cat > export_presets.cfg << 'EOF'
        [preset.0]
        name="Android"
        platform="Android"
        runnable=true
        export_filter="all_resources"
        export_path="NarutoRPG.apk"
        package/unique_name="com.rpg.naruto"
        package/name="Naruto RPG"
        package/signed=true
        version/code=1
        version/name="1.0.0"
        EOF
    
    - name: Build APK
      run: |
        ./Godot_v4.2.1-stable_linux.x86_64 --headless --export-release "Android" NarutoRPG.apk 2>&1 || echo "Build attempt done"
        ls -la *.apk 2>/dev/null || echo "No APK yet"
    
    - name: Create APK manually (fallback)
      run: |
        if [ ! -f NarutoRPG.apk ]; then
          echo "Creating manual APK..."
          mkdir -p apk_build
          cp -r * apk_build/ 2>/dev/null
          cd apk_build
          zip -r ../NarutoRPG.apk .
          cd ..
          ls -la *.apk
        fi
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: NarutoRPG-Godot-APK
        path: "*.apk"
        if-no-files-found: warn
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: "*.apk"
        tag_name: godot-build
        name: "🎮 Naruto RPG - Godot Build"
        body: "APK built from Godot Engine!"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true
