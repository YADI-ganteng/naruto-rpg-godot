name: Godot RPG Android Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      # Ambil source code dari repository
      - name: Checkout Repository
        uses: actions/checkout@v4


      # Install Godot 4.3
      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: "4.3.0"
          use-dotnet: false


      # Cek struktur project Godot
      - name: Verify Godot Project
        run: |
          ls -la
          test -f project.godot
          echo "Godot project ditemukan"


      # Import project agar Godot membaca semua resource
      - name: Import Godot Project
        run: |
          godot --headless --editor --quit


      # Install Android export template
      - name: Setup Android Export Templates
        run: |
          godot --headless --editor --quit --install-android-build-template


      # Build APK Android
      - name: Export Android APK
        run: |
          mkdir -p build
          godot --headless \
          --path . \
          --export-release "Android" \
          build/NarutoRPG.apk


      # Simpan APK hasil build
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Naruto-RPG-Android
          path: build/NarutoRPG.apk
