name: Godot RPG Android Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4


    - name: Setup Godot
      uses: chickensoft-games/setup-godot@v2
      with:
        version: "4.3.0"


    - name: Check Project
      run: |
        godot --headless --editor --quit


    - name: Install Android SDK
      uses: android-actions/setup-android@v3


    - name: Export APK
      run: |
        mkdir -p build
        godot --headless --path . --export-release "Android" build/naruto-rpg.apk


    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Naruto-RPG-APK
        path: build/naruto-rpg.apk
