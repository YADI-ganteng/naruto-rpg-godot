name: Godot RPG Android Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Godot
      uses: chickensoft-games/setup-godot@v2
      with:
        version: "4.3.0"
        use-dotnet: false

    - name: Install Android Export Templates
      run: |
        mkdir -p ~/.local/share/godot/export_templates/4.3.stable
        wget -q https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz
        unzip -o Godot_v4.3-stable_export_templates.tpz -d ~/.local/share/godot/export_templates/4.3.stable
        mv ~/.local/share/godot/export_templates/4.3.stable/templates/* ~/.local/share/godot/export_templates/4.3.stable/
        rm -rf ~/.local/share/godot/export_templates/4.3.stable/templates

    - name: Check Godot project
      run: |
        godot --headless --editor --quit

    - name: Export Android APK
      run: |
        mkdir -p build
        godot --headless --path . --export-debug "Android" build/game.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: build/game.apk
