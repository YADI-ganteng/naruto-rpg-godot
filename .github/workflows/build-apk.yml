name: Build Godot APK

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Godot
      run: |
        wget -q https://github.com/godotengine/godot/releases/download/4.2.1-stable/Godot_v4.2.1-stable_linux.x86_64.zip
        unzip -q Godot_v4.2.1-stable_linux.x86_64.zip
        chmod +x Godot_v4.2.1-stable_linux.x86_64
        mkdir -p ~/.local/share/godot/export_templates/4.2.1.stable
        wget -q https://github.com/godotengine/godot/releases/download/4.2.1-stable/Godot_v4.2.1-stable_export_templates.tpz
        unzip -q Godot_v4.2.1-stable_export_templates.tpz -d ~/.local/share/godot/export_templates/4.2.1.stable/
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Create Export Config
      run: |
        cat > export_presets.cfg << 'EOF'
        [preset.0]
        name="Android"
        platform="Android"
        runnable=true
        export_filter="all_resources"
        export_path="build/NarutoRPG.apk"
        package/unique_name="com.rpg.naruto"
        package/name="Naruto RPG"
        package/signed=true
        version/code=1
        version/name="1.0.0"
        EOF
    
    - name: Build APK
      run: |
        ./Godot_v4.2.1-stable_linux.x86_64 --headless --export-release "Android" build/NarutoRPG.apk 2>&1 || true
        echo "APK files:"
        find . -name "*.apk" -type f -ls
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: NarutoRPG-APK
        path: "**/*.apk"
        if-no-files-found: warn
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: "**/*.apk"
        tag_name: v1.0
        name: "📱 Naruto RPG v1.0"
        body: "APK siap install!"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true
