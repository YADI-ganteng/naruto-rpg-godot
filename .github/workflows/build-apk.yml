name: Build Godot Android

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Godot
  uses: chickensoft-games/setup-godot@v2
  with:
    version: "4.3.0"

    - name: Import Project
      run: godot --headless --editor --quit

    - name: Build Android
      run: |
        mkdir -p build
        godot --headless --path . \
        --export-release "Android" \
        build/NarutoRPG.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: NarutoRPG-Android
        path: build/NarutoRPG.apk
